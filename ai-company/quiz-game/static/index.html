<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 AI 퀴즈게임</title>
<style>
:root {
  --bg: #080d18;
  --card: #0f1724;
  --card2: #161f30;
  --border: #1a3050;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --orange: #f97316;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --muted: #546880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

#bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: .35; }

.app {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ── 헤더 ── */
header { text-align: center; padding: 28px 0 18px; }
header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}
header p { color: var(--muted); margin-top: 6px; font-size: .9rem; }

/* ── 점수바 ── */
.score-bar {
  display: flex;
  justify-content: space-around;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.score-item { text-align: center; min-width: 60px; }
.score-item .val { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
.score-item .val.streak { color: var(--yellow); }
.score-item .lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

/* ── 레벨 스트립 ── */
.level-strip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.lstrip-label {
  font-size: 1rem;
  font-weight: 800;
  white-space: nowrap;
  min-width: 80px;
}
.lstrip-bar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}
.lstrip-bar {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.lstrip-fill {
  height: 100%;
  border-radius: 10px;
  transition: width .4s ease;
  background: linear-gradient(90deg, var(--green), var(--accent));
}
.lstrip-pct {
  font-size: .8rem;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}
.lstrip-max {
  font-size: .75rem;
  color: var(--orange);
  font-weight: 700;
  white-space: nowrap;
}

/* ── 장르 그리드 ── */
.genre-section { margin-bottom: 20px; }
.genre-section h2 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

.genre-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.genre-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 8px 12px;
  cursor: pointer;
  text-align: center;
  transition: all .18s;
  color: var(--text);
  position: relative;
}
.genre-btn:hover { border-color: var(--accent); transform: translateY(-2px); background: #0b1625; }
.genre-btn.active { border-color: var(--accent); background: #091a2e; box-shadow: 0 0 16px rgba(0,212,255,.15); }
.genre-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
.genre-btn .name { font-weight: 700; font-size: .82rem; display: block; }
.genre-btn .cnt {
  font-size: .7rem; color: var(--muted); margin-top: 4px;
  background: var(--card2); border-radius: 20px; padding: 2px 8px; display: inline-block;
}
.genre-btn.active .cnt { background: rgba(0,212,255,.1); color: var(--accent); }

/* 레벨 뱃지 (장르 버튼 우상단) */
.lvl-badge {
  position: absolute;
  top: 5px; right: 5px;
  font-size: .6rem;
  font-weight: 800;
  padding: 2px 5px;
  border-radius: 8px;
  background: rgba(16,185,129,.2);
  color: var(--green);
  border: 1px solid rgba(16,185,129,.3);
}
.lvl-badge.lv2 { background: rgba(59,130,246,.2); color: var(--blue); border-color: rgba(59,130,246,.3); }
.lvl-badge.lv3 { background: rgba(249,115,22,.2); color: var(--orange); border-color: rgba(249,115,22,.3); }

/* ── 시작 버튼 ── */
.start-wrap { margin-bottom: 10px; }
.start-btn {
  display: none;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 1.05rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: .5px;
  transition: opacity .2s, transform .1s;
}
.start-btn.show { display: block; }
.start-btn:hover { opacity: .9; transform: scale(1.01); }

/* ── 문제 카드 ── */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px 24px;
  display: none;
  animation: slideUp .3s ease;
}
.quiz-card.show { display: block; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.progress-bar { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 18px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .4s ease; }

.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 6px; }
.q-tag { background: rgba(0,212,255,.1); color: var(--accent); border: 1px solid rgba(0,212,255,.25); padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 700; }
.q-num { color: var(--muted); font-size: .82rem; }
.q-diff { font-size: .8rem; }

.q-text { font-size: 1.2rem; font-weight: 700; line-height: 1.6; margin-bottom: 22px; color: #f0f6ff; }

/* ── 선택지 ── */
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.choice-btn {
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: 13px;
  padding: 15px 16px;
  cursor: pointer;
  color: var(--text);
  font-size: .92rem;
  text-align: left;
  display: flex;
  align-items: flex-start;
  gap: 11px;
  transition: all .18s;
  line-height: 1.45;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: #0b1d35; transform: scale(1.015); }
.choice-btn .idx {
  min-width: 26px; height: 26px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .8rem; flex-shrink: 0; margin-top: 1px;
}
.choice-btn.correct { border-color: var(--green); background: #041e12; }
.choice-btn.correct .idx { background: var(--green); color: #000; }
.choice-btn.wrong { border-color: var(--red); background: #200a0a; }
.choice-btn.wrong .idx { background: var(--red); }
.choice-btn:disabled { cursor: default; }

/* ── 해설 ── */
.explain-panel {
  display: none;
  margin-top: 18px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  animation: slideUp .25s ease;
}
.explain-panel.show { display: block; }
.explain-header { padding: 13px 18px; font-weight: 700; font-size: .92rem; display: flex; align-items: center; gap: 8px; }
.explain-header.ok  { background: #041e12; color: var(--green); border-bottom: 1px solid #064d25; }
.explain-header.ng  { background: #200a0a; color: var(--red);   border-bottom: 1px solid #5c1515; }
.explain-body { background: var(--card2); padding: 18px; line-height: 1.8; font-size: .92rem; color: #b8c8dc; }

/* ── 다음 버튼 ── */
.next-btn {
  display: none;
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: linear-gradient(135deg, #0ea5e9, var(--accent2));
  border: none;
  border-radius: 13px;
  color: #fff;
  font-size: .98rem;
  font-weight: 800;
  cursor: pointer;
  transition: opacity .2s;
}
.next-btn.show { display: block; }
.next-btn:hover { opacity: .88; }

/* ── 결과 화면 ── */
.result-screen {
  display: none;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 24px;
  animation: slideUp .35s ease;
}
.result-screen.show { display: block; }
.result-emoji { font-size: 3.5rem; margin-bottom: 14px; }
.result-score { font-size: 2.8rem; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
.result-msg { color: var(--muted); margin-bottom: 26px; font-size: 1rem; }
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 26px; }
.result-stat { background: var(--card2); border-radius: 13px; padding: 14px 10px; }
.result-stat .sv { font-size: 1.5rem; font-weight: 800; }
.result-stat .sl { font-size: .76rem; color: var(--muted); margin-top: 4px; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.replay-btn {
  padding: 13px 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 13px;
  color: #fff; font-size: .95rem; font-weight: 700;
  cursor: pointer; transition: opacity .2s;
}
.replay-btn:hover { opacity: .88; }
.replay-btn.outline { background: var(--card2); border: 2px solid var(--border); color: var(--text); }

/* ── 레벨업 오버레이 ── */
.levelup-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.levelup-overlay.show { opacity: 1; pointer-events: all; }

.levelup-card {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 24px;
  padding: 44px 52px;
  text-align: center;
  animation: levelupPop .45s ease;
  max-width: 340px;
  width: 90%;
}
@keyframes levelupPop {
  from { transform: scale(.6); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.levelup-emoji { font-size: 4.5rem; margin-bottom: 12px; }
.levelup-title {
  font-size: 1.8rem; font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.levelup-sub { color: var(--muted); margin-bottom: 28px; font-size: 1rem; line-height: 1.6; }
.levelup-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 13px;
  color: #fff; font-size: 1rem; font-weight: 800;
  cursor: pointer; transition: opacity .2s;
}
.levelup-btn:hover { opacity: .88; }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card); border: 1px solid var(--border);
  padding: 11px 22px; border-radius: 40px;
  font-size: .88rem; font-weight: 700;
  transition: transform .28s ease;
  z-index: 999; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── 반응형 ── */
@media (max-width: 640px) {
  header h1 { font-size: 1.7rem; }
  .genre-grid { grid-template-columns: repeat(2, 1fr); }
  .choices { grid-template-columns: 1fr; }
  .result-grid { grid-template-columns: 1fr; }
  .level-strip { flex-direction: column; align-items: flex-start; gap: 8px; }
  .lstrip-bar-wrap { width: 100%; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- 레벨업 오버레이 -->
<div class="levelup-overlay" id="levelup-overlay">
  <div class="levelup-card">
    <div class="levelup-emoji" id="lu-emoji">🎉</div>
    <div class="levelup-title" id="lu-title">레벨 업!</div>
    <div class="levelup-sub" id="lu-sub">다음 레벨로 진급했습니다!</div>
    <button class="levelup-btn" onclick="closeLevelUp()">계속하기 →</button>
  </div>
</div>

<div class="app">
  <header>
    <h1>🧠 AI 퀴즈게임</h1>
    <p>Claude Code · Python · 서버 · DB · 에이전트 · 로컬LLM · 역사 · 상식</p>
  </header>

  <!-- 점수바 -->
  <div class="score-bar">
    <div class="score-item"><div class="val" id="sc-score">0</div><div class="lbl">점수</div></div>
    <div class="score-item"><div class="val streak" id="sc-streak">🔥 0</div><div class="lbl">연속</div></div>
    <div class="score-item"><div class="val" id="sc-correct">0</div><div class="lbl">정답</div></div>
    <div class="score-item"><div class="val" id="sc-total">0</div><div class="lbl">문제</div></div>
    <div class="score-item"><div class="val" id="sc-acc">-</div><div class="lbl">정답률</div></div>
  </div>

  <!-- 레벨 스트립 -->
  <div class="level-strip">
    <div class="lstrip-label" id="lstrip-label">🌱 입문</div>
    <div class="lstrip-bar-wrap">
      <div class="lstrip-bar">
        <div class="lstrip-fill" id="lstrip-fill" style="width:0%"></div>
      </div>
      <div class="lstrip-pct" id="lstrip-pct">0/10</div>
    </div>
    <div class="lstrip-max" id="lstrip-max"></div>
  </div>

  <!-- 장르 선택 -->
  <div class="genre-section" id="genre-section">
    <h2>장르 선택</h2>
    <div class="genre-grid" id="genre-grid"></div>
  </div>

  <!-- 시작 버튼 -->
  <div class="start-wrap">
    <button class="start-btn show" id="start-btn" onclick="startQuiz()">▶ 퀴즈 시작!</button>
  </div>

  <!-- 문제 카드 -->
  <div class="quiz-card" id="quiz-card">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="q-meta">
      <span class="q-tag" id="q-tag">-</span>
      <span class="q-diff" id="q-diff"></span>
      <span class="q-num" id="q-num">1 / 10</span>
    </div>
    <div class="q-text" id="q-text">로딩 중...</div>
    <div class="choices" id="choices"></div>

    <div class="explain-panel" id="explain-panel">
      <div class="explain-header" id="explain-header"></div>
      <div class="explain-body" id="explain-body"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- 결과 -->
  <div class="result-screen" id="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score">0점</div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-grid">
      <div class="result-stat"><div class="sv" id="rs-correct" style="color:var(--green)">0</div><div class="sl">정답</div></div>
      <div class="result-stat"><div class="sv" id="rs-wrong" style="color:var(--red)">0</div><div class="sl">오답</div></div>
      <div class="result-stat"><div class="sv" id="rs-acc" style="color:var(--accent)">0%</div><div class="sl">정답률</div></div>
    </div>
    <div class="btn-row">
      <button class="replay-btn" onclick="replayQuiz()">🔄 다시 풀기</button>
      <button class="replay-btn outline" onclick="goHome()">🏠 처음으로</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 파티클 배경 ──────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let pts = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
function initPts() {
  pts = Array.from({length:55}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
    r: Math.random()*1.8+.4, a: Math.random()*.45+.15
  }));
}
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,212,255,${p.a})`; ctx.fill();
  });
  requestAnimationFrame(draw);
}
window.addEventListener('resize',()=>{resize();initPts();});
resize(); initPts(); draw();

// ── 레벨 시스템 ──────────────────────────────
const LEVEL_INFO = {
  1: { label: '🌱 입문',    color: '#10b981', barColor: 'linear-gradient(90deg,#10b981,#3b82f6)' },
  2: { label: '📚 중급',    color: '#3b82f6', barColor: 'linear-gradient(90deg,#3b82f6,#8b5cf6)' },
  3: { label: '🔥 전문가',  color: '#f97316', barColor: 'linear-gradient(90deg,#f97316,#ef4444)' },
};
const LV_NEXT_LABELS = { 1: '중급', 2: '전문가', 3: null };
const LEVEL_UP_NEED = 10;

function getLevel(genre)    { return parseInt(localStorage.getItem('lvl_'+genre) || '1'); }
function getLvlProg(genre)  { return parseInt(localStorage.getItem('lp_'+genre)  || '0'); }

// 정답 시 레벨 진행, 레벨업이면 새 레벨 반환, 아니면 false
function addLvlCorrect(genre) {
  const lv = getLevel(genre);
  if (lv >= 3) return false;
  const prog = getLvlProg(genre) + 1;
  localStorage.setItem('lp_'+genre, prog);
  if (prog >= LEVEL_UP_NEED) {
    const newLv = lv + 1;
    localStorage.setItem('lvl_'+genre, newLv);
    localStorage.setItem('lp_'+genre, '0');
    return newLv;
  }
  return false;
}

function updateLevelStrip(genre) {
  const lv   = getLevel(genre);
  const prog = getLvlProg(genre);
  const info = LEVEL_INFO[lv];
  const fill = document.getElementById('lstrip-fill');
  document.getElementById('lstrip-label').textContent = info.label;
  document.getElementById('lstrip-label').style.color = info.color;
  fill.style.background = info.barColor;

  if (lv >= 3) {
    fill.style.width = '100%';
    document.getElementById('lstrip-pct').textContent = '만렙!';
    document.getElementById('lstrip-max').textContent = '🏆';
  } else {
    fill.style.width = (prog / LEVEL_UP_NEED * 100) + '%';
    document.getElementById('lstrip-pct').textContent = prog + '/' + LEVEL_UP_NEED;
    document.getElementById('lstrip-max').textContent = '→ ' + LV_NEXT_LABELS[lv];
  }
}

function showLevelUp(newLevel) {
  const info = LEVEL_INFO[newLevel];
  const overlay = document.getElementById('levelup-overlay');
  document.getElementById('lu-emoji').textContent = newLevel === 3 ? '🏆' : '🎉';
  document.getElementById('lu-title').textContent = info.label + ' 달성!';
  document.getElementById('lu-sub').textContent =
    newLevel < 3
      ? `축하합니다! 이제 ${info.label} 문제에 도전합니다.\n더 어려운 문제가 기다리고 있어요!`
      : `🔥 전문가 레벨 달성!\n최고 난이도 문제를 풀고 있습니다!`;
  overlay.classList.add('show');
  // 다음 퀴즈 시 새 레벨 문제 로드를 위해 캐시 초기화
  allQ[curGenre] = null;
}

function closeLevelUp() {
  document.getElementById('levelup-overlay').classList.remove('show');
  updateLevelStrip(curGenre);
  updateGenreGrid();
}

// ── 상태 ──────────────────────────────
let allQ = {};
let genres = {};
let curGenre = 'ai_tools';
let sessionQ = [], qIdx = 0, score = 0, streak = 0, correctCnt = 0;
const MAX_Q = 10;

// ── 초기화 ──────────────────────────────
async function init() {
  const res = await fetch('/api/genres');
  genres = await res.json();
  renderGenreGrid();
  const firstKey = Object.keys(genres)[0];
  if (firstKey) selectGenre(firstKey);
}

function renderGenreGrid() {
  const grid = document.getElementById('genre-grid');
  grid.innerHTML = '';
  Object.entries(genres).forEach(([key, g]) => {
    const lv = getLevel(key);
    const lvClass = lv === 1 ? '' : lv === 2 ? ' lv2' : ' lv3';
    const btn = document.createElement('button');
    btn.className = 'genre-btn' + (key === curGenre ? ' active' : '');
    btn.id = 'gbtn-'+key;
    btn.dataset.genre = key;
    btn.innerHTML = `
      <span class="lvl-badge${lvClass}">Lv.${lv}</span>
      <span class="icon">${g.icon}</span>
      <span class="name">${g.label}</span>
      <span class="cnt">${g.count}문제</span>`;
    btn.onclick = () => selectGenre(key);
    grid.appendChild(btn);
  });
}

function updateGenreGrid() {
  Object.keys(genres).forEach(key => {
    const btn = document.getElementById('gbtn-'+key);
    if (!btn) return;
    const lv = getLevel(key);
    const lvClass = lv === 1 ? '' : lv === 2 ? ' lv2' : ' lv3';
    const badge = btn.querySelector('.lvl-badge');
    if (badge) { badge.textContent = 'Lv.'+lv; badge.className = 'lvl-badge'+lvClass; }
  });
}

function selectGenre(key) {
  const wasPlaying = document.getElementById('quiz-card').classList.contains('show');
  curGenre = key;
  document.querySelectorAll('.genre-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.genre === key);
  });
  updateLevelStrip(key);
  if (wasPlaying) {
    document.getElementById('result-screen').classList.remove('show');
    startQuiz();
  }
}

// ── 문제 로드 (난이도 필터) ──────────────────────────────
async function loadGenreQ(genre) {
  if (allQ[genre]) return allQ[genre];
  const lv = getLevel(genre);
  const r = await fetch(`/api/questions/${genre}?difficulty=${lv}`);
  let data = await r.json();
  // 해당 난이도 문제 없으면 전체 로드
  if (!data.length) {
    const r2 = await fetch(`/api/questions/${genre}`);
    data = await r2.json();
  }
  allQ[genre] = data;
  return allQ[genre];
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── 퀴즈 시작 ──────────────────────────────
async function startQuiz() {
  const pool = await loadGenreQ(curGenre);
  if (!pool.length) { toast('❌ 문제가 없습니다'); return; }
  sessionQ = shuffle(pool).slice(0, Math.min(MAX_Q, pool.length));
  qIdx = 0; score = 0; streak = 0; correctCnt = 0;
  document.getElementById('start-btn').classList.remove('show');
  document.getElementById('result-screen').classList.remove('show');
  updateScoreBar();
  updateLevelStrip(curGenre);
  showQ();
}

// ── 난이도 별 표시 ──────────────────────────────
const DIFF_STARS = { 1: '⭐', 2: '⭐⭐', 3: '⭐⭐⭐' };
const DIFF_COLORS = { 1: '#10b981', 2: '#3b82f6', 3: '#f97316' };

function showQ() {
  const card = document.getElementById('quiz-card');
  card.classList.remove('show'); void card.offsetWidth; card.classList.add('show');

  const q = sessionQ[qIdx];
  const diff = q.difficulty || 2;
  document.getElementById('q-tag').textContent = q.tag || curGenre;
  document.getElementById('q-diff').textContent = DIFF_STARS[diff];
  document.getElementById('q-diff').style.color = DIFF_COLORS[diff];
  document.getElementById('q-num').textContent = `${qIdx+1} / ${sessionQ.length}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('progress-fill').style.width = `${(qIdx/sessionQ.length)*100}%`;
  document.getElementById('explain-panel').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  const labels = ['①','②','③','④'];
  const el = document.getElementById('choices');
  el.innerHTML = '';
  q.choices.forEach((c,i) => {
    const b = document.createElement('button');
    b.className = 'choice-btn';
    b.innerHTML = `<span class="idx">${labels[i]}</span><span>${c}</span>`;
    b.onclick = () => pick(i, q);
    el.appendChild(b);
  });
}

// ── 답 선택 ──────────────────────────────
function pick(chosen, q) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const ok = chosen === q.answer;

  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  if(!ok) document.querySelectorAll('.choice-btn')[chosen].classList.add('wrong');

  if(ok) {
    streak++; correctCnt++;
    const bonus = streak > 1 ? (streak-1)*20 : 0;
    score += 100 + bonus;

    // 레벨 진행
    const leveledUp = addLvlCorrect(curGenre);
    updateLevelStrip(curGenre);
    updateGenreGrid();

    if (leveledUp) {
      toast('🎉 레벨업! ' + LEVEL_INFO[leveledUp].label + ' 달성!');
      setTimeout(() => showLevelUp(leveledUp), 800);
    } else {
      toast(streak > 1 ? `🔥 연속 ${streak}! +${100+bonus}점` : '✅ 정답! +100점');
    }
  } else {
    streak = 0;
    toast('❌ 오답... 해설을 확인하세요');
  }
  updateScoreBar();
  showExplain(ok, q);
  document.getElementById('next-btn').classList.add('show');
  qIdx++;
}

function showExplain(ok, q) {
  const hdr = document.getElementById('explain-header');
  const body = document.getElementById('explain-body');
  hdr.className = 'explain-header ' + (ok ? 'ok' : 'ng');
  hdr.textContent = ok ? '✅ 정답입니다!' : `❌ 오답 — 정답: ${q.choices[q.answer]}`;
  body.textContent = q.explanation;
  document.getElementById('explain-panel').classList.add('show');
}

// ── 다음 / 결과 ──────────────────────────────
function nextQuestion() {
  if(qIdx >= sessionQ.length) showResult();
  else showQ();
}

function showResult() {
  document.getElementById('quiz-card').classList.remove('show');
  const acc = Math.round((correctCnt/sessionQ.length)*100);
  const lv = getLevel(curGenre);
  const lvLabel = LEVEL_INFO[lv].label;
  const [em, msg] = acc>=80
    ? ['🏆', `${lvLabel} 완벽 마스터!`]
    : acc>=60 ? ['😊','잘 하셨어요! 조금만 더!']
    : acc>=40 ? ['🤔','절반은 맞췄어요!']
    : ['💪','다시 도전해봐요!'];
  document.getElementById('result-emoji').textContent = em;
  document.getElementById('result-score').textContent = `${score.toLocaleString()}점`;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('rs-correct').textContent = correctCnt;
  document.getElementById('rs-wrong').textContent = sessionQ.length - correctCnt;
  document.getElementById('rs-acc').textContent = `${acc}%`;
  document.getElementById('result-screen').classList.add('show');
}

function replayQuiz() {
  document.getElementById('result-screen').classList.remove('show');
  allQ[curGenre] = null; // 다시 섞기
  startQuiz();
}

function goHome() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-card').classList.remove('show');
  document.getElementById('start-btn').classList.add('show');
  score=0; streak=0; correctCnt=0; qIdx=0;
  updateScoreBar();
}

// ── 점수바 ──────────────────────────────
function updateScoreBar() {
  document.getElementById('sc-score').textContent = score.toLocaleString();
  document.getElementById('sc-streak').textContent = `🔥 ${streak}`;
  document.getElementById('sc-correct').textContent = correctCnt;
  document.getElementById('sc-total').textContent = qIdx;
  document.getElementById('sc-acc').textContent = qIdx>0 ? Math.round(correctCnt/qIdx*100)+'%' : '-';
}

// ── 토스트 ──────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), 2200);
}

init();
</script>
